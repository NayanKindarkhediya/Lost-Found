<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Lost & Found</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <section class="login-wrapper">
    <div class="login-card">
      <div class="login-icon"><img src="All img/login 2.png"></div>
      <h2>Welcome Back</h2>
      <p class="login-sub">Login to continue</p>

      <label>Email Address</label>
      <input type="email" id="email" class="login-input-email" placeholder="name@example.com" />
      <p id="emailError" style="color:red; font-size:13px;"></p>

      <label>Password</label>

      <div class="password-box">
        <input type="password" id="password" class="login-input-pass" placeholder="Enter your password" />

        <span onclick="togglePassword('password')" class="eye-icon">
          <img id="eye-password" src="All img/eye.png" width="20">
        </span>
      </div>

      <p id="passError" style="color:red; font-size:13px;"></p>

      <p id="passError" style="color:red; font-size:13px;"></p>

      <button class="login-btn" id="loginBtn">Continue</button>

      <a href="#" class="forgot">Forgot Password?</a>

      <p class="signup-text">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </p>
    </div>
  </section>

  <script>
    document.getElementById("loginBtn").addEventListener("click", function () {
      let email = document.getElementById("email").value.trim();
      let password = document.getElementById("password").value;

      let emailError = document.getElementById("emailError");
      let passError = document.getElementById("passError");

      emailError.textContent = "";
      passError.textContent = "";

      let valid = true;

      if (!email.includes("@") || !email.includes(".")) {
        emailError.textContent = "Enter a valid email!";
        valid = false;
      }

      if (password.length < 6) {
        passError.textContent = "Password must be at least 6 characters!";
        valid = false;
      }

      if (valid) {
        // Store login session (temporary)
        localStorage.setItem("loggedIn", "true");

        // Redirect to home page
        window.location.href = "home.html";
      }
    });


    // Passworld show 

    function togglePassword(id) {
      let input = document.getElementById(id);
      let eyeIcon = document.getElementById("eye-" + id);

      if (input.type === "password") {
        input.type = "text";
        eyeIcon.src = "All img/hidden.png";   // closed eye
      } else {
        input.type = "password";
        eyeIcon.src = "All img/eye.png";      // open eye
      }
    }
  </script>
</body>

</html>
