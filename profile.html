<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FindIt – User Profile</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Lost/Found Items Grid */
      .items-grid {
        margin: 0 8%;
        display: flex;
        flex-wrap: wrap;
        gap: 25px;
        justify-content: flex-start;
      }

      .item-card {
        flex: 1 1 calc(25% - 25px); /* 4 items per row */
        max-width: 200px;
        min-height: 300px;
        background: var(--card);
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        padding: 10px;
        text-align: center;
        position: relative;
        cursor: pointer;
        transition: 0.3s;
      }

      .item-card img {
        width: 180px;
        height: 180px;
        object-fit: cover;
        border-radius: 10px;
        margin-top: 20px;
      }

      .item-card span {
        position: absolute;
        top: 8px;
        left: 8px;
        padding: 3px 8px;
        font-size: 11px;
        font-weight: bold;
        border-radius: 5px;
        color: white;
      }

      .item-card span.lost {
        background: #e53935;
      }
      .item-card span.found {
        background: #4caf50;
      }

      .item-card h3 {
        font-size: 15px;
        margin: 20px 0 10px;
        font-weight: 600;
      }

      .item-card p {
        font-size: 13px;
        color: #777;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="logo">
        <img src="All img/Lost logo.png" />
      </div>

      <nav>
        <a href="Home.html">Home</a>
        <a href="Lost.html">Lost Item</a>
        <a href="Found.html">Found Item</a>
        <a href="Profile.html" id="nav-profile">Profile</a>
      </nav>
    </header>

    <div class="container-pro">
      <h2 class="title">My Account</h2>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('profile')">
          Profile
        </button>
        <button class="tab" onclick="switchTab('lostItems')">Lost Items</button>
        <button class="tab" onclick="switchTab('foundItems')">
          Found Items
        </button>
        <button class="tab" onclick="switchTab('password')">
          Change Password
        </button>
      </div>

      <!-- Profile Section -->
      <div id="profile" class="tabContent active">
        <div class="profile-section">
          <div class="profile-photo">
            <img
              id="profileImage"
              src="https://via.placeholder.com/120"
              alt=""
            />
            <input type="file" id="uploadProfile" accept="image/*" /><br />
            <label class="upload-btn" for="uploadProfile">Change Photo</label>
          </div>

          <div class="profile-form">
            <!-- NAME -->
            <div class="form-group">
              <label>Full Name</label>
              <input
                type="text"
                id="fullName"
                placeholder="👤Enter Your Name"
              />
              <div class="errorText" id="nameError">Full name is required</div>
            </div>

            <!-- EMAIL -->
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="email" placeholder="📧Enter Your Email" />
              <div class="errorText" id="emailError">Enter a valid email</div>
            </div>

            <!-- PHONE -->
            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" id="phone" placeholder="📞Enter Your Number" />
              <div class="errorText" id="phoneError">
                Phone number is required
              </div>
            </div>

            <button class="save-btn" onclick="saveProfile()">
              Save Changes
            </button>
          </div>
        </div>
      </div>

      <!-- Lost Items -->
      <div id="lostItems" class="tabContent">
        <h3>Your Lost Items</h3>
        <div id="myLostItems" class="items-grid"></div>
        <div
          id="myLostItems"
          style="
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: space-around;
          "
        ></div>
      </div>

      <!-- Found Items -->
      <div id="foundItems" class="tabContent">
        <h3>Your Found Items</h3>
        <div id="myFoundItems" class="items-grid"></div>
        <div
          id="myFoundItems"
          style="
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: space-around;
          "
        ></div>
      </div>

      <!-- Change Password -->
      <div id="password" class="tabContent">
        <h3>Change Password</h3>

        <div class="form-group">
          <label>Current Password</label>
          <input
            id="currentPass"
            type="password"
            placeholder="Enter current password"
          />
          <div class="errorText" id="currentError">Enter current password</div>
        </div>

        <div class="form-group">
          <label>New Password</label>
          <input
            id="newPass"
            type="password"
            placeholder="Enter new password"
          />
          <div class="errorText" id="newPassError">
            Password must be at least 6 characters
          </div>
        </div>

        <div class="form-group">
          <label>Confirm New Password</label>
          <input
            id="confirmPass"
            type="password"
            placeholder="Re-enter new password"
          />
          <div class="errorText" id="confirmError">Passwords do not match</div>
        </div>

        <button class="save-btn" id="updatePasswordBtn">Update Password</button>
      </div>
    </div>

    <script>
      // PROFILE IMAGE PREVIEW + SAVE
      document
        .getElementById("uploadProfile")
        .addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (file) {
            document.getElementById("profileImage").src =
              URL.createObjectURL(file);

            const reader = new FileReader();
            reader.onload = () =>
              localStorage.setItem("profileImage", reader.result);
            reader.readAsDataURL(file);
          }
        });

      // LOAD SAVED DATA ON PAGE LOAD
      window.onload = () => {
        const savedImg = localStorage.getItem("profileImage");
        if (savedImg) document.getElementById("profileImage").src = savedImg;

        document.getElementById("fullName").value =
          localStorage.getItem("name") || "";

        document.getElementById("email").value =
          localStorage.getItem("email") || "";

        document.getElementById("phone").value =
          localStorage.getItem("phone") || "";

        loadMyLostItems();
        loadMyFoundItems();
      };

      // TAB SWITCH
      function switchTab(tab) {
        document
          .querySelectorAll(".tab")
          .forEach((btn) => btn.classList.remove("active"));
        document
          .querySelectorAll(".tabContent")
          .forEach((c) => c.classList.remove("active"));

        document
          .querySelector(`[onclick="switchTab('${tab}')"]`)
          .classList.add("active");
        document.getElementById(tab).classList.add("active");
      }

      // PROFILE VALIDATION + SAVE TEXT DATA
      function saveProfile() {
        let name = document.getElementById("fullName");
        let email = document.getElementById("email");
        let phone = document.getElementById("phone");

        let valid = true;

        function showError(input, errorId, condition) {
          if (condition) {
            input.classList.add("errorInput");
            document.getElementById(errorId).style.display = "block";
            valid = false;
          } else {
            input.classList.remove("errorInput");
            document.getElementById(errorId).style.display = "none";
          }
        }

        showError(name, "nameError", name.value.trim() === "");
        showError(email, "emailError", !email.value.includes("@"));
        showError(phone, "phoneError", phone.value.trim() === "");

        if (valid) {
          // SAVE TO LOCAL STORAGE
          localStorage.setItem("fullName", name.value);
          localStorage.setItem("email", email.value);
          localStorage.setItem("phone", phone.value);

          alert("Profile Updated Successfully!");
        }
      }

      // PASSWORD VALIDATION
      document
        .getElementById("updatePasswordBtn")
        .addEventListener("click", () => {
          let current = document.getElementById("currentPass");
          let newPass = document.getElementById("newPass");
          let confirmPass = document.getElementById("confirmPass");

          let ok = true;

          function err(input, errorId, condition) {
            if (condition) {
              input.classList.add("errorInput");
              document.getElementById(errorId).style.display = "block";
              ok = false;
            } else {
              input.classList.remove("errorInput");
              document.getElementById(errorId).style.display = "none";
            }
          }

          err(current, "currentError", current.value.trim() === "");
          err(newPass, "newPassError", newPass.value.length < 6);
          err(confirmPass, "confirmError", newPass.value !== confirmPass.value);

          if (ok) {
            alert("Password Updated Successfully!");
          }
        });

      // Tabs nav

      // Automatically highlight Profile tab
      window.addEventListener("DOMContentLoaded", () => {
        const profileLink = document.getElementById("nav-profile");
        if (profileLink) {
          profileLink.classList.add("active");
        }
      });

      // SHOW USER LOST AND FOUND ITEMS IN PROFILE

      function loadMyLostItems() {
        let userEmail = localStorage.getItem("email");
        let lostItems = JSON.parse(localStorage.getItem("lostItems")) || [];
        let myItems = lostItems.filter((item) => item.ownerEmail === userEmail);
        let container = document.getElementById("myLostItems");

        if (myItems.length === 0) {
          container.innerHTML = "<p>No lost items reported yet.</p>";
          return;
        }

        container.innerHTML = "";

        myItems.forEach((item) => {
          let card = document.createElement("div");
          card.className = "item-card";
          card.style.cursor = "pointer";
          card.onclick = () =>
            (window.location.href = `Lost.html?id=${item.id}`);

          card.innerHTML = `
      <div style="
        background:white;
        border-radius:12px;
        box-shadow:0 2px 8px rgba(0,0,0,0.1);
        padding:10px;
        transition:0.3s;
        width:200px;
        min-height:300px;
      ">
        <div style="position:relative;">
          <img src="${item.img || ""}" style="
            margin-top: 20px;
            width:180px;
            height:180px;
            object-fit:cover;
            border-radius:10px;
          ">
          <span style="
           position:absolute;
           top: -3px;
           left: 2px;
           background:${item.type === "Lost" ? "#e53935" : "#c32727"};
           color:white;
           padding:3px 8px;
           font-size:11px;
           font-weight:bold;
           border-radius:5px; 
          ">LOST</span>
        </div>
        <h3 style="font-size:15px; margin:20px 0 10px; font-weight:600;">${item.name}</h3>
        <p style="font-size:13px; color:#777; margin:0;">
         • ${item.location}  <br><br> • ${formatDate(item.date)}
        </p>
      </div>
    `;
          container.appendChild(card);
        });
      }

      function loadMyFoundItems() {
        let userEmail = localStorage.getItem("email");
        let foundItems = JSON.parse(localStorage.getItem("foundItems")) || [];
        let myItems = foundItems.filter(
          (item) => item.ownerEmail === userEmail,
        );
        let container = document.getElementById("myFoundItems");

        if (myItems.length === 0) {
          container.innerHTML = "<p>No found items submitted yet.</p>";
          return;
        }

        container.innerHTML = "";

        myItems.forEach((item) => {
          let card = document.createElement("div");
          card.className = "item-card";
          card.style.cursor = "pointer";
          card.onclick = () =>
            (window.location.href = `Found.html?id=${item.id}`);

          card.innerHTML = `
      <div style="
        background:white;
        border-radius:12px;
        box-shadow:0 2px 8px rgba(0,0,0,0.1);
        padding:10px;
        transition:0.3s;
        min-height:300px
      ">
        <div style="position:relative;">
          <img src="${item.img || ""}" style="
            margin-top: 20px;
            width:180px;
            height:180px;
            object-fit:cover;
            border-radius:10px;
          ">
          <span style="
            position:absolute;
            top: -3px;
            left: 2px;
            background:#4caf50;
            color:white;
            padding:3px 8px;
            font-size:11px;
            font-weight:bold;
            border-radius:5px;
          ">FOUND</span>
        </div>
        <h3 style="font-size:15px; margin:20px 0 10px; font-weight:600;">${item.name}</h3>
        <p style="font-size:13px; color:#777; margin:0;">
        • ${item.location} <br><br> • ${formatDate(item.date)}
        </p>
      </div>
    `;
          container.appendChild(card);
        });
      }
      function formatDate(dateString) {
        let date = new Date(dateString);

        return date.toLocaleDateString("en-US", {
          year: "numeric",
          month: "short",
          day: "numeric",
        });
      }
    </script>
  </body>
</html>
